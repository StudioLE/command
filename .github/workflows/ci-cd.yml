name: CI/CD

on:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  ci-cd:
    name: CI/CD
    uses: StudioLE/Actions/.github/workflows/ci-cd-crates.yml@v7
    with:
      run_before_test: |
        /home/linuxbrew/.linuxbrew/bin/brew install cargo-expand
        echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"
    secrets:
      cargo_registry_token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
